services:
  postgres:
    image: postgres:latest
    container_name: small_square_plus_postgres
    env_file:
      - .env
    environment:
      - POSTGRES_DB=smallsqure_plus_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./db/initdb.d:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: small_square_plus_redis
    ports:
      - "6379:6379"

networks:
  app-network:
    driver: bridge